<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品詳細 · SoulFa</title>
  <link rel="icon" type="image/png" href="網頁分頁logo.png" />
  <link rel="stylesheet" href="https://use.typekit.net/wdm8jyp.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">

  <style>
    /* Match Merch page background */
    body.merch { background: #E8E8E8; color: #1a1e1f; }
    body.merch::before { mix-blend-mode: multiply; opacity: 0.06; }

    body.merch nav.top .brand,
    body.merch nav.top ul a { color: #1a1e1f; }
    body.merch nav.top .brand:hover { color: #d66528; }
    body.merch nav.top ul a:hover,
    body.merch nav.top ul a.is-active {
      color: #d66528;
      font-variation-settings: 'wdth' 125, 'SEED' 12;
      letter-spacing: 0.24em;
      border-bottom: 1px solid #d66528;
    }
    body.merch nav.top.scrolled {
      background: rgba(232, 232, 232, 0.92);
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
    }

    /* ─── CART BOOKMARK (copy from merch.html for consistency) ─── */
    .cart-bookmark {
      position: fixed; right: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 9000;
      background: #FFFFFF;
      color: #1a1e1f;
      width: 52px; height: 96px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px 0 0 10px;
      box-shadow: -2px 0 16px rgba(0,0,0,0.13);
      transition: transform 0.32s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.3s ease;
    }
    .cart-bookmark:hover {
      transform: translateY(-50%) translateX(-8px) scale(1.08);
      box-shadow: -5px 0 24px rgba(0,0,0,0.18);
    }
    .cart-bookmark .cart-content {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .cart-bookmark svg { display: block; stroke: currentColor; transition: stroke 0.22s ease; }
    .cart-bm-badge {
      width: 15px; height: 15px; border-radius: 50%;
      background: #d66528; color: #FFFFFF;
      font-family: var(--font-juana); font-weight: 600; font-size: 9px;
      line-height: 1; letter-spacing: 0;
      display: none; align-items: center; justify-content: center; padding: 0;
    }
    .cart-bookmark.has-items .cart-bm-badge { display: flex; }
    .cart-bookmark.has-items { color: #d66528; }
    .cart-bookmark.has-items svg { stroke: #d66528; }

    /* ─── PRODUCT PAGE LAYOUT ─── */
    section.scene { padding: 110px 36px 100px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: #1a1e1f;
      text-transform: uppercase;
      margin-bottom: 36px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #d66528; }

    .product-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 64px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .product-layout { grid-template-columns: 1fr; gap: 40px; }
    }

    /* Left: images */
    .product-images { display: flex; flex-direction: column; gap: 14px; }
    .main-image {
      aspect-ratio: 1;
      background: #DCDCDC;
      overflow: hidden;
      cursor: zoom-in;
    }
    .main-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: contrast(1.04);
      transition: opacity 0.18s ease;
      display: block;
    }
    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fill, 84px);
      gap: 10px;
    }
    .thumb {
      aspect-ratio: 1;
      background: #DCDCDC;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb:hover { transform: translateY(-2px); }
    .thumb.active { border-color: #d66528; }

    /* Right: info */
    .product-info { display: flex; flex-direction: column; gap: 18px; }
    .product-category {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #d66528;
    }
    .product-name {
      font-family: var(--font-zh);
      font-weight: 500;
      font-size: clamp(28px, 3.4vw, 38px);
      letter-spacing: 0.02em;
      line-height: 1.25;
      color: #1a1e1f;
      margin: 0;
    }
    .product-price {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 22px;
      color: #1a1e1f;
      letter-spacing: 0.04em;
    }

    .product-description {
      font-family: var(--font-zh);
      font-weight: 400;
      font-size: 15px;
      line-height: 1.85;
      color: rgba(26, 30, 31, 0.78);
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.10);
      min-height: 38px;
    }
    .product-description.empty::before {
      content: '— 創作理念待補 —';
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(26, 30, 31, 0.42);
      letter-spacing: 0.1em;
    }

    /* Spec block (tracklist / size / dimensions) */
    .product-spec {
      padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,0.10);
    }
    .spec-label {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(26, 30, 31, 0.6);
      margin-bottom: 14px;
    }

    /* Tracklist — extra compact, no dividers */
    .tracklist {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .track {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: baseline;
      padding: 2px 0;
    }
    .track-no {
      font-family: var(--font-mono);
      color: rgba(26, 30, 31, 0.5);
      letter-spacing: 0.04em;
      font-size: 9.5px;
    }
    .track-title {
      font-family: var(--font-zh);
      font-weight: 400;
      color: #1a1e1f;
      font-size: 11px;
      letter-spacing: 0.01em;
    }
    .track-title.tbd { color: rgba(26, 30, 31, 0.4); font-style: italic; }
    .track-dur {
      font-family: var(--font-mono);
      color: rgba(26, 30, 31, 0.5);
      letter-spacing: 0.04em;
      font-size: 9.5px;
    }

    /* Size chart */
    .size-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .size-table th, .size-table td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px dashed rgba(0,0,0,0.12);
    }
    .size-table th {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(26, 30, 31, 0.6);
    }
    .size-table td {
      font-family: var(--font-mono);
      color: #1a1e1f;
      font-size: 13px;
    }
    .size-table .size-col {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: #1a1e1f;
    }
    .size-unit {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(26, 30, 31, 0.5);
      text-transform: uppercase;
      margin-left: 8px;
    }

    .washing-tips {
      margin-top: 12px;
      padding: 14px 16px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
    }
    .washing-tips-title {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26, 30, 31, 0.6);
      margin-bottom: 8px;
    }
    .washing-tips ul {
      margin: 0;
      padding-left: 18px;
      font-family: var(--font-zh);
      font-size: 13px;
      line-height: 1.85;
      color: rgba(26, 30, 31, 0.78);
    }

    /* Dimensions */
    .dimensions {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #1a1e1f;
    }
    .dimensions .label-inline {
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(26, 30, 31, 0.6);
      margin-right: 12px;
    }

    /* Size selector (for apparel) */
    .size-picker { display: flex; gap: 10px; padding-top: 18px; }
    .size-opt {
      min-width: 48px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(0,0,0,0.25);
      background: transparent;
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .size-opt:hover { border-color: #d66528; color: #d66528; }
    .size-opt.active { background: #1a1e1f; color: #FFFFFF; border-color: #1a1e1f; }

    /* Quantity + add to cart */
    .buy-row {
      display: flex;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid rgba(0,0,0,0.10);
      margin-top: 8px;
    }
    .qty-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.25);
    }
    .qty-btn {
      width: 40px; height: 44px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-family: var(--font-juana);
      color: #1a1e1f;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: rgba(0,0,0,0.06); }
    .qty-val {
      min-width: 36px;
      text-align: center;
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 14px;
    }

    .add-to-cart-btn {
      flex: 1;
      padding: 0 28px;
      height: 44px;
      background: #1a1e1f;
      color: #FFFFFF;
      border: none;
      cursor: pointer;
      font-family: var(--font-juana);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      transition: background 0.2s ease;
    }
    .add-to-cart-btn:hover { background: #d66528; }
    .add-to-cart-btn.added { background: #4a8a4a; }

    /* ─── CART PANEL (mirrors merch.html) ─── */
    .cart-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 9050;
      display: none;
      cursor: pointer;
    }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 400px; max-width: 95vw;
      background: #F0EEEA;
      z-index: 9060;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .cart-panel.open { transform: translateX(0); }
    .cart-head {
      padding: 22px 24px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .cart-head-title {
      font-family: var(--font-juana);
      font-weight: 600; font-size: 20px;
      color: #1a1e1f;
    }
    .cart-close-btn {
      background: transparent; border: none;
      font-size: 24px; cursor: pointer;
      color: #1a1e1f; padding: 2px 6px;
      transition: opacity 0.2s; line-height: 1;
    }
    .cart-close-btn:hover { opacity: 0.5; }
    .cart-items-wrap {
      flex: 1; overflow-y: auto; padding: 16px 24px;
    }
    .cart-empty {
      padding: 60px 0; text-align: center;
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.25em;
      text-transform: uppercase; color: rgba(26,26,26,0.35);
    }
    .cart-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .cart-item-img {
      width: 68px; height: 68px;
      object-fit: cover; background: #DCDCDC;
      flex-shrink: 0; display: block;
    }
    .cart-item-body { flex: 1; min-width: 0; }
    .cart-item-name {
      font-family: var(--font-zh);
      font-weight: 500; font-size: 14px;
      color: #1a1e1f; line-height: 1.4;
      margin-bottom: 4px; word-break: break-word;
    }
    .cart-item-price {
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(26,26,26,0.55);
      margin-bottom: 10px;
    }
    .cart-item-qty-row {
      display: flex; align-items: center; gap: 0;
      width: fit-content;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .cq-btn {
      background: transparent; border: none;
      width: 28px; height: 28px; font-size: 16px;
      cursor: pointer; color: #1a1e1f;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .cq-btn:hover { background: rgba(0,0,0,0.06); }
    .cq-val {
      min-width: 32px; text-align: center;
      font-family: var(--font-mono); font-size: 13px;
      color: #1a1e1f;
      border-left: 1px solid rgba(0,0,0,0.15);
      border-right: 1px solid rgba(0,0,0,0.15);
      height: 28px; line-height: 28px;
    }
    .cart-item-del {
      background: transparent; border: none;
      cursor: pointer; color: rgba(26,26,26,0.3);
      font-size: 18px; padding: 4px;
      transition: color 0.15s; flex-shrink: 0;
      align-self: center; line-height: 1;
    }
    .cart-item-del:hover { color: #1a1e1f; }
    .cart-foot {
      padding: 20px 24px;
      border-top: 1px solid rgba(0,0,0,0.1);
      background: #F0EEEA;
      flex-shrink: 0;
    }
    .cart-total-row {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-bottom: 18px;
    }
    .cart-total-label {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.4em;
      text-transform: uppercase; color: rgba(26,26,26,0.55);
    }
    .cart-total-amt {
      font-family: var(--font-juana);
      font-weight: 600; font-size: 20px;
      color: #1a1e1f;
    }
    .cart-checkout-btn {
      width: 100%; padding: 15px;
      background: #1a1e1f; border: none;
      color: #F0EEEA;
      font-family: var(--font-juana);
      font-weight: 600; font-size: 13px;
      letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.25s;
    }
    .cart-checkout-btn:hover { background: #333333; }
    .cart-note {
      margin-top: 10px; text-align: center;
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.15em;
      color: rgba(26,26,26,0.35);
      text-transform: uppercase;
    }

    /* Footer overrides */
    body.merch footer { background: #DCDCDC; border-top: 1px solid rgba(0, 0, 0, 0.12); }
    body.merch .footer-socials a { color: #1a1e1f; border: none; padding: 4px; }
    body.merch .footer-socials a:hover { color: #000000; transform: translateY(-2px); }
    body.merch .footer-legal { color: rgba(0, 0, 0, 0.5); border-top: 1px solid rgba(0, 0, 0, 0.12); }
  </style>
</head>
<body class="merch">

<div class="page-transition"></div>

<nav class="top" id="topnav">
  <a class="brand" href="index.html">SOULFA</a>
  <ul>
    <li><a href="music.html">Music</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="tour.html">Tour</a></li>
    <li><a href="merch.html" class="is-active">Merch</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<!-- Cart bookmark — opens cart panel in-place -->
<button class="cart-bookmark" id="cart-bookmark" aria-label="購物車">
  <div class="cart-content">
    <span class="cart-bm-badge" id="cart-bm-badge">0</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
</button>

<!-- Cart Overlay + Panel (mirrors merch.html for in-place cart) -->
<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-panel" id="cart-panel" role="dialog" aria-label="購物車">
  <div class="cart-head">
    <div class="cart-head-title">購物車</div>
    <button class="cart-close-btn" id="cart-close-btn" aria-label="關閉購物車">×</button>
  </div>
  <div class="cart-items-wrap" id="cart-items-wrap">
    <div class="cart-empty" id="cart-empty">購物車是空的</div>
  </div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <div class="cart-total-label">小計</div>
      <div class="cart-total-amt" id="cart-total-amt">TWD $0</div>
    </div>
    <button class="cart-checkout-btn" id="cart-checkout-btn">結帳 →</button>
    <div class="cart-note">結帳系統即將開放</div>
  </div>
</div>

<section class="scene">
  <div class="container">
    <a class="back-link" href="merch.html">← Back to Merch</a>

    <div class="product-layout" id="product-layout">
      <!-- Left: image gallery -->
      <div class="product-images">
        <div class="main-image">
          <img id="main-img" src="" alt=""/>
        </div>
        <div class="thumbnails" id="thumbnails"></div>
      </div>

      <!-- Right: info + spec + buy -->
      <div class="product-info">
        <div class="product-category" id="product-category"></div>
        <h1 class="product-name" id="product-name"></h1>
        <div class="product-price" id="product-price"></div>
        <div class="product-description" id="product-description"></div>

        <div class="product-spec" id="product-spec">
          <!-- populated by JS depending on product type -->
        </div>

        <div id="size-picker-wrap"></div>

        <div class="buy-row">
          <div class="qty-selector">
            <button class="qty-btn" id="qty-dec">−</button>
            <span class="qty-val" id="qty-val">1</span>
            <button class="qty-btn" id="qty-inc">+</button>
          </div>
          <button class="add-to-cart-btn" id="add-to-cart-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  // ── Cart (shared via localStorage) ──
  function loadCart() {
    try { return JSON.parse(localStorage.getItem('soulfa_cart') || '{"items":[]}'); }
    catch (e) { return { items: [] }; }
  }
  function saveCart() { localStorage.setItem('soulfa_cart', JSON.stringify(cart)); }
  var cart = loadCart();

  function cartCount() { return cart.items.reduce(function(s, it) { return s + it.qty; }, 0); }
  function cartTotal() { return cart.items.reduce(function(s, it) { return s + it.price * it.qty; }, 0); }
  function updateBadge() {
    var n = cartCount();
    var badge = document.getElementById('cart-bm-badge');
    var bookmark = document.getElementById('cart-bookmark');
    badge.textContent = n;
    bookmark.classList.toggle('has-items', n > 0);
  }

  // ── Cart panel render / open / close ──
  function renderCart() {
    var wrap = document.getElementById('cart-items-wrap');
    var empty = document.getElementById('cart-empty');
    var totalEl = document.getElementById('cart-total-amt');
    Array.from(wrap.querySelectorAll('.cart-item')).forEach(function (el) { el.remove(); });
    if (cart.items.length === 0) {
      empty.style.display = '';
    } else {
      empty.style.display = 'none';
      cart.items.forEach(function (item, idx) {
        var div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML =
          '<img class="cart-item-img" src="' + item.photo + '" alt="' + item.name + '">' +
          '<div class="cart-item-body">' +
            '<div class="cart-item-name">' + item.name + '</div>' +
            '<div class="cart-item-price">TWD $' + item.price.toLocaleString() + '</div>' +
            '<div class="cart-item-qty-row">' +
              '<button class="cq-btn" data-action="dec" data-idx="' + idx + '">−</button>' +
              '<span class="cq-val">' + item.qty + '</span>' +
              '<button class="cq-btn" data-action="inc" data-idx="' + idx + '">+</button>' +
            '</div>' +
          '</div>' +
          '<button class="cart-item-del" data-action="del" data-idx="' + idx + '" aria-label="移除">×</button>';
        wrap.insertBefore(div, null);
      });
    }
    totalEl.textContent = 'TWD $' + cartTotal().toLocaleString();
  }
  function openCart() {
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-panel').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderCart();
  }
  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-panel').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('cart-bookmark').addEventListener('click', openCart);
  document.getElementById('cart-close-btn').addEventListener('click', closeCart);
  document.getElementById('cart-overlay').addEventListener('click', closeCart);
  document.getElementById('cart-checkout-btn').addEventListener('click', function () {
    alert('結帳系統即將開放，敬請期待！');
  });
  document.getElementById('cart-items-wrap').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var action = btn.dataset.action;
    var idx = parseInt(btn.dataset.idx, 10);
    if (action === 'inc') cart.items[idx].qty++;
    else if (action === 'dec') {
      cart.items[idx].qty--;
      if (cart.items[idx].qty <= 0) cart.items.splice(idx, 1);
    } else if (action === 'del') cart.items.splice(idx, 1);
    saveCart();
    updateBadge();
    renderCart();
  });

  updateBadge();

  // ── Get product from URL ?id=xxx ──
  var params = new URLSearchParams(window.location.search);
  var pid = params.get('id');
  var product = (window.PRODUCTS || {})[pid];

  if (!product) {
    document.getElementById('product-layout').innerHTML =
      '<p style="grid-column:1/-1;text-align:center;padding:80px 0;font-family:var(--font-mono);color:rgba(0,0,0,0.5);">商品不存在 — <a href="merch.html" style="color:#d66528;">回 Merch</a></p>';
    return;
  }

  document.title = product.name + ' · SoulFa';

  // ── Populate basic info ──
  document.getElementById('product-category').textContent = product.category || '';
  document.getElementById('product-name').textContent = product.name;
  document.getElementById('product-price').textContent = 'TWD $ ' + product.price.toLocaleString();

  var desc = document.getElementById('product-description');
  if (product.description && product.description.trim()) {
    desc.textContent = product.description;
  } else {
    desc.classList.add('empty');
  }

  // ── Image gallery ──
  var mainImg = document.getElementById('main-img');
  var thumbs = document.getElementById('thumbnails');
  function setMain(src) {
    mainImg.style.opacity = '0';
    setTimeout(function () {
      mainImg.src = src;
      // Specific photos (內容物 = content shot) shouldn't be cropped — show full image
      var noCrop = src.indexOf('內容物') > -1;
      mainImg.style.objectFit = noCrop ? 'contain' : 'cover';
      mainImg.parentElement.style.background = noCrop ? '#E8E8E8' : '#DCDCDC';
      mainImg.style.opacity = '1';
    }, 100);
    Array.from(thumbs.querySelectorAll('.thumb')).forEach(function (t) {
      t.classList.toggle('active', t.dataset.src === src);
    });
  }
  mainImg.style.transition = 'opacity 0.18s ease';
  mainImg.src = product.images[0];
  mainImg.alt = product.name;

  product.images.forEach(function (src, i) {
    var t = document.createElement('div');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.dataset.src = src;
    t.innerHTML = '<img src="' + src + '" alt=""/>';
    t.addEventListener('click', function () { setMain(src); });
    thumbs.appendChild(t);
  });

  // ── Spec block (varies by product type) ──
  var spec = document.getElementById('product-spec');
  if (product.tracklist) {
    var html = '<div class="spec-label">Tracklist · 曲目</div><div class="tracklist">';
    product.tracklist.forEach(function (t) {
      var isTbd = (t.title || '').indexOf('待填入') > -1;
      html += '<div class="track">' +
        '<span class="track-no">' + String(t.no).padStart(2, '0') + '</span>' +
        '<span class="track-title' + (isTbd ? ' tbd' : '') + '">' + t.title + '</span>' +
        '<span class="track-dur">' + t.duration + '</span>' +
        '</div>';
    });
    html += '</div>';
    spec.innerHTML = html;
  } else if (product.sizes) {
    var sizeRows = product.sizes.map(function (s) {
      return '<tr>' +
        '<td class="size-col">' + s.size + '</td>' +
        '<td>' + s.length + '</td>' +
        '<td>' + s.chest + '</td>' +
        '<td>' + s.shoulder + '</td>' +
        '<td>' + s.sleeve + '</td>' +
        '</tr>';
    }).join('');
    var tipsHtml = '';
    if (product.washingTips) {
      tipsHtml = '<div class="washing-tips"><div class="washing-tips-title">洗滌建議</div><ul>' +
        product.washingTips.map(function (t) { return '<li>' + t + '</li>'; }).join('') +
        '</ul></div>';
    }
    spec.innerHTML =
      '<div class="spec-label">Size Chart · 尺寸表 <span class="size-unit">cm</span></div>' +
      '<table class="size-table"><thead><tr>' +
        '<th>尺寸</th><th>衣長</th><th>胸圍</th><th>肩寬</th><th>袖長</th>' +
      '</tr></thead><tbody>' + sizeRows + '</tbody></table>' + tipsHtml;
  } else if (product.dimensions) {
    var d = product.dimensions;
    spec.innerHTML =
      '<div class="spec-label">Dimensions · 尺寸</div>' +
      '<div class="dimensions">' +
        '<span class="label-inline">L × W × H</span>' +
        d.length + ' × ' + d.width + ' × ' + d.height + ' cm' +
      '</div>';
  } else {
    spec.style.display = 'none';
  }

  // ── Size picker (apparel) ──
  var selectedSize = null;
  if (product.sizeOptions && product.sizeOptions.length) {
    var wrap = document.getElementById('size-picker-wrap');
    var picker = document.createElement('div');
    picker.className = 'size-picker';
    product.sizeOptions.forEach(function (sz, i) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'size-opt' + (i === 0 ? ' active' : '');
      b.textContent = sz;
      b.addEventListener('click', function () {
        Array.from(picker.children).forEach(function (c) { c.classList.remove('active'); });
        b.classList.add('active');
        selectedSize = sz;
      });
      picker.appendChild(b);
    });
    selectedSize = product.sizeOptions[0];
    wrap.appendChild(picker);
  }

  // ── Quantity ──
  var qty = 1;
  var qtyVal = document.getElementById('qty-val');
  document.getElementById('qty-inc').addEventListener('click', function () {
    qty++; qtyVal.textContent = qty;
  });
  document.getElementById('qty-dec').addEventListener('click', function () {
    if (qty > 1) { qty--; qtyVal.textContent = qty; }
  });

  // ── Add to cart ──
  var addBtn = document.getElementById('add-to-cart-btn');
  addBtn.addEventListener('click', function () {
    // Refresh from storage in case another tab/page added items
    cart = loadCart();
    var key = pid + (selectedSize ? '__' + selectedSize : '');
    var existing = cart.items.find(function (it) { return it.key === key; });
    if (existing) {
      existing.qty += qty;
    } else {
      cart.items.push({
        key: key,
        id: pid,
        name: product.name + (selectedSize ? ' (' + selectedSize + ')' : ''),
        price: product.price,
        qty: qty,
        photo: product.images[0]
      });
    }
    saveCart();
    updateBadge();
    addBtn.textContent = '已加入購物車 ✓';
    addBtn.classList.add('added');
    setTimeout(function () {
      addBtn.textContent = 'Add to Cart';
      addBtn.classList.remove('added');
    }, 1800);
  });
})();
</script>
